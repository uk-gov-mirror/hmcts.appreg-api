//AD disabled
tasks.sonarqube.dependsOn(jacocoTestReport)
tasks['check'].finalizedBy integration


sonarqube {
  properties {
    property "sonar.projectName", "AppReg :: appreg-api"
    property "sonar.projectKey", "uk.gov.hmcts.appreg:appreg-api"
  }
}

// before committing a change, make sure task still works
dependencyUpdates {
  def isNonStable = { String version ->
    def stableKeyword = ['RELEASE', 'FINAL', 'GA'].any { qualifier -> version.toUpperCase().contains(qualifier) }
    def regex = /^[0-9,.v-]+$/
    return !stableKeyword && !(version ==~ regex)
  }
  rejectVersionIf { selection -> // <---- notice how the closure argument is named
    return isNonStable(selection.candidate.version) && !isNonStable(selection.currentVersion)
  }
}

// https://jeremylong.github.io/DependencyCheck/dependency-check-gradle/configuration.html
dependencyCheck {
  // Specifies if the build should be failed if a CVSS score above a specified level is identified.
  // range of 0-10 fails the build, anything greater and it doesn't fail the build
  failBuildOnCVSS = 0
  suppressionFile = 'config/owasp/suppressions.xml'

  analyzers {
    // Disable scanning of .NET related binaries
    assemblyEnabled = false
  }
  skipConfigurations = [
      "compileOnly",
      "pmd",
      "integrationTest",
      "functionalTest",
      "smokeTest",
      "contractTestRuntimeClasspath",
      "contractTestCompileClasspath"
  ]
}

repositories {
  mavenLocal()
  mavenCentral()
  maven {
    url = uri('https://pkgs.dev.azure.com/hmcts/Artifacts/_packaging/hmcts-lib/maven/v1')
  }
}

ext {
  log4JVersion = "2.25.1"
  logbackVersion = "1.5.18"
}

ext['snakeyaml.version'] = '2.0'

dependencies {
  // Core Spring Boot Starters
  implementation group: 'org.springframework.boot', name: 'spring-boot-starter-web'
  implementation group: 'org.springframework.boot', name: 'spring-boot-starter-actuator'
  implementation group: 'org.springframework.boot', name: 'spring-boot-starter-aop'
  implementation group: 'org.springframework.boot', name: 'spring-boot-starter-json'

  implementation group: 'org.springframework.boot', name: 'spring-boot-starter-data-jpa'
  implementation 'org.openapitools:jackson-databind-nullable:0.2.6'

  // OAuth2 support
  implementation group: 'org.springframework.boot', name: 'spring-boot-starter-oauth2-resource-server'

    // SpringDoc OpenAPI
    implementation group: 'org.springdoc', name: 'springdoc-openapi-starter-webmvc-ui', version: '2.8.13'

  // Logging
  implementation group: 'com.github.hmcts.java-logging', name: 'logging', version: '6.1.9'
  implementation group: 'org.apache.logging.log4j', name: 'log4j-api', version: log4JVersion
  implementation group: 'org.apache.logging.log4j', name: 'log4j-to-slf4j', version: log4JVersion
  implementation group: 'org.springframework.boot', name: 'spring-boot-starter-security'

  // correlation log support
  implementation 'io.micrometer:micrometer-tracing-bridge-otel'
  implementation 'io.micrometer:micrometer-tracing'

  // get flyway core
  implementation 'org.flywaydb:flyway-core:11.11.2'
  implementation 'org.flywaydb:flyway-database-postgresql:11.11.2'

  // A hibernate library that generates column constants
  annotationProcessor 'org.hibernate.orm:hibernate-jpamodelgen:6.5.2.Final'

  // Lombok
  compileOnly group: 'org.projectlombok', name: 'lombok', version: '1.18.40'
  annotationProcessor group: 'org.projectlombok', name: 'lombok', version: '1.18.40'

  // Database
  runtimeOnly group: 'org.postgresql', name: 'postgresql', version: '42.7.7'

  // Testing
  testImplementation group: 'org.springframework.boot', name: 'spring-boot-starter-test'
  testImplementation group: 'io.rest-assured', name: 'rest-assured', version: '5.5.6'
  testImplementation("org.openapitools:jackson-databind-nullable:0.2.6")
  testImplementation 'org.springframework.security:spring-security-test'
  testImplementation("com.squareup.okhttp3:mockwebserver:4.12.0")
  testImplementation 'io.github.hakky54:logcaptor:2.11.0'
  testImplementation 'org.testcontainers:testcontainers:1.21.0'
  testImplementation 'org.testcontainers:postgresql:1.20.0'
  testImplementation group: 'org.springframework.boot', name: 'spring-boot-starter-test', {
    exclude group: 'junit', module: 'junit'
    exclude group: 'org.junit.vintage', module: 'junit-vintage-engine'
  }
  testImplementation 'io.github.hakky54:logcaptor:2.12.1'

  testImplementation group: 'org.springframework.cloud', name: 'spring-cloud-starter-contract-stub-runner', version: '4.2.1'
  testImplementation 'org.instancio:instancio-junit:5.5.1'
  rewrite group: 'org.openrewrite.recipe', name: 'rewrite-static-analysis', version: '2.16.0'

  // Updated Third-Party Dependencies
  implementation 'org.apache.commons:commons-lang3:3.18.0'
  implementation 'org.apache.tomcat.embed:tomcat-embed-core:10.1.44'
  implementation 'org.apache.tomcat.embed:tomcat-embed-websocket:10.1.44'

  // Mapstruct dependency
  implementation 'org.mapstruct:mapstruct:1.5.5.Final' // your version
  annotationProcessor 'org.mapstruct:mapstruct-processor:1.5.5.Final'
  testAnnotationProcessor 'org.mapstruct:mapstruct-processor:1.5.5.Final'
}

bootJar {
  archiveFileName = "app-register.jar"

  manifest {
    attributes('Implementation-Version': project.version.toString())
  }
}

// Gradle 7.x issue, workaround from: https://github.com/gradle/gradle/issues/17236#issuecomment-894768083
rootProject.tasks.named("processSmokeTestResources") {
  duplicatesStrategy = 'include'
}


// Gradle 7.x issue, workaround from: https://github.com/gradle/gradle/issues/17236#issuecomment-894768083
rootProject.tasks.named("processSmokeTestResources") {
  duplicatesStrategy = 'include'
}

rootProject.tasks.named("processFunctionalTestResources") {
  duplicatesStrategy = 'include'
}

rootProject.tasks.named("processIntegrationTestResources") {
  duplicatesStrategy = 'include'
}

wrapper {
  distributionType = Wrapper.DistributionType.ALL
}

// Put this near the top-level of the file (outside any block)
import org.apache.tools.ant.filters.ReplaceTokens

tasks.named('processResources', Copy) {
  inputs.property("version", project.version.toString())

  filesMatching("openapi/openapi.yaml") {
    filteringCharset = 'UTF-8'
    filter { String line -> line.replace('@version@', project.version.toString()) }
  }
}

checkstyle {
  checkstyleMain.exclude '**/uk/gov/hmcts/appregister/generated/**'
  maxWarnings = 0
}

// Generate spring annotated methods inside a generated java package for ease of identification
openApiGenerate {
    generatorName = "spring"
    inputSpec = "$rootDir/src/main/resources/openapi/openapi.yaml"
    outputDir = layout.buildDirectory.dir("generated/openapi").get().asFile.toString()
    apiPackage = "uk.gov.hmcts.appregister.generated.api"
    modelPackage = "uk.gov.hmcts.appregister.generated.model"
    skipOperationExample = true
    openapiNormalizer = [
            REF_AS_PARENT_IN_ALLOF: "true"
    ]
    configOptions = [
            dateLibrary                         : "java8",
            interfaceOnly                       : "true",
            useTags                             : "true",
            useSpringBoot3                      : "true",
            containerDefaultToNull              : "true",
            generatedConstructorWithRequiredArgs: "false",
            additionalModelTypeAnnotations      : "@lombok.AllArgsConstructor;@lombok.NoArgsConstructor",
            openApiNullable                     : "true"
    ]
}

openApiValidate {
  inputSpec = file('src/main/resources/openapi/openapi.yaml').toURI().toString()
}

processResources.dependsOn tasks.openApiGenerate
compileJava.dependsOn tasks.openApiGenerate



