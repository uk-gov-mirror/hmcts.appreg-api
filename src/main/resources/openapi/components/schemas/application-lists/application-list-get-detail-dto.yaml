type: object
description: Immutable DTO representing a detailed Application List.
required:
  - id
  - date
  - time
  - description
  - status
  - version

properties:

  id:
    type: string
    format: uuid
    description: Unique identifier of the Application List.
    example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"

  date:
    type: string
    format: date
    description: The calendar date on which the Application List is scheduled.
    example: "2025-09-17"

  time:
    type: string
    format: time
    description: The time of day at which the Application List is scheduled, seconds are optional.
    example: "10:30:00, 10:30"

  description:
    type: string
    description: Human-readable description of the Application List (e.g. session title or purpose).
    example: "Morning session for traffic-related applications"

  status:
    $ref: './application-list-status.yaml'

  courtCode:
    type: string
    description: Code that identifies the Court Location.
    example: "LOC123"

  courtName:
    type: string
    description: Name that identifies the Court Location.
    example: "Bath Magistrates Court"

  cjaCode:
    type: string
    description: Criminal Justice Area code.
    example: "CJA001"

  otherLocationDescription:
    type: string
    description: Free-text location if not using a standard court.
    example: "Temporary Courtroom at Town Hall"

  durationHours:
    type: integer
    format: int32
    minimum: 0
    description: Duration hours component.
    example: 2

  durationMinutes:
    type: integer
    format: int32
    minimum: 0
    maximum: 59
    description: Duration minutes component.
    example: 30

  version:
    type: integer
    format: int64
    description: Current resource version for optimistic concurrency.
    example: 3

  entriesCount:
    type: integer
    format: int32
    minimum: 0
    description: Total number of Application List Entries associated with this Application List.
    example: 12

  entriesSummary:
    type: array
    items: { $ref: 'application-list-entry-summary.yaml' }
    description: A list of lightweight summaries of entries.
