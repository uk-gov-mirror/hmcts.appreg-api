type: object
description: Request payload to create an Application List.
required:
  - date
  - time
  - description
  - status

properties:

  date:
    type: string
    format: date
    description: The calendar date on which the Application List is scheduled.
    example: "2025-09-17"

  time:
    type: string
    format: time
    description: The time of day at which the Application List is scheduled, seconds are optional.
    example: "10:30:00, 10:30"

  description:
    type: string

  status:
    $ref: './application-list-status.yaml'

  courtLocationCode:
    type: string
    description: Code that identifies the Court Location.
    example: "LOC123"
    maxLength: 10

  otherLocationDescription:
    type: string
    description: Free-text location if not using a standard court.
    example: "Temporary Courtroom at Town Hall"
    maxLength: 200

  cjaCode:
    type: string
    description: Criminal Justice Area code.
    example: "CJ"
    maxLength: 2

  durationHours:
    type: integer
    format: int32
    minimum: 0

  durationMinutes:
    type: integer
    format: int32
    minimum: 0
    maximum: 59
