# code, name, AL1, Use From, Use to
type: object
description: Lightweight DTO for Standard Applicants, used in list/search views.
required:
  - id,
  - code,
  - name,
  - addressLine1
  - startDate
  - endDate
properties:
  id:
    type: integer
    format: int64
    description: Unique identifier.
  code:
    type: string
    description: Code that identifies the Standard Applicant.
  name:
    type: string
    description: Name of the Standard Applicant.
  addressLine1:
    type: string
    description: First line of the Standard Applicant's address.
  startDate:
    type: string
    format: date
    description: Start date from which the Standard Applicant is valid.
  endDate:
    type: string
    format: date
    nullable: true
    description: End date until which the Standard Applicant is valid.
