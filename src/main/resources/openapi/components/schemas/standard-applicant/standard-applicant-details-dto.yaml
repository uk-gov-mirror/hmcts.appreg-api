type: object
description: Immutable DTO representing a detailed Result Code.
required:
  - id
  - resultCode
  - title
  - wording
  - startDate
properties:
  id:
    type: integer
    format: int64
    description: Primary key identifier.
  resultCode:
    type: string
    description: Code that identifies the result.
  title:
    type: string
    description: Human-readable title.
  wording:
    type: string
    description: Full descriptive wording, potentially with blank fields to be inputted by the user.
  startDate:
    type: string
    format: date
    description: Start date from which the code is valid.
  endDate:
    type: string
    format: date
    nullable: true
    description: End date until which the code is valid.

# Name, code, title, name (full), forename1, forename2, forename3, surname, emailAd, Tele num, startD, endD, AL1-AL5, PostCode, Mob Num.
