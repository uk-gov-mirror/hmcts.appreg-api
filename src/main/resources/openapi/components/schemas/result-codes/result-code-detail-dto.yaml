type: object
description: Immutable DTO representing a detailed Result Code.
required:
  - resultCode
  - title
  - wording
properties:
  resultCode:
    type: string
    description: Code that identifies the result.
  title:
    type: string
    description: Human-readable title.
  wording:
    type: string
    description: Full descriptive wording, potentially with blank fields to be inputted by the user.
