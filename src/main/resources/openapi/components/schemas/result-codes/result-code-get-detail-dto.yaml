type: object
description: Immutable DTO representing a detailed Result Code.
required:
  - resultCode
  - title
  - wording
  - startDate
  - endDate
  - wording
properties:
  resultCode:
    type: string
    description: Code that identifies the result.
    example: "RC-001"
  title:
    type: string
    description: Human-readable title.
    example: "Application List Entry Fee Status"
  wording:
    $ref: '../common/template-detail.yaml'
  startDate:
    type: string
    format: date
    description: Date the Result Code became active.
    example: "2025-12-01"
  endDate:
    type: string
    format: date
    description: Date the Result Code became inactive. `null` indicates that this row is still active.
    nullable: true
    example: "2025-12-31"
