type: object
description: Immutable DTO representing a detailed Standard Applicant.
required:
  - code
  - startDate
  - endDate

properties:

  code:
    type: string
    description: Code that identifies the Standard Applicant.
    example: "STANDARD-1"
  name:
    type: string
    description: Name of the Standard Applicant.
    example: "Standard Applicant 1"

  applicant:
    $ref: '../participants/applicant.yaml'

  startDate:
    type: string
    format: date
    description: Date the applicant record became active.
    example: "2025-12-01"

  endDate:
    type: string
    format: date
    description: Date the applicant became inactive. `null` indicates that this row is still active.
    nullable: true
    example: "2025-12-01"
