type: object
description: The template field with the associated value to substitute
required: [name, value]
properties:
  key:
    type: string
    description: Field key for substitution into the template.
    example: "account-number"
  value:
    type: string
    description: The field value to substitute into the template key
    example: "1234"
example:
  fields:
    - property: "account"
      value: "1234"
