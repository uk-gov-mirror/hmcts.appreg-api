type: object
description: The template field with the associated value to substitute. Blank fields will be rejected, nulls should be used instead.
required: [name, value]
properties:
  key:
    type: string
    description: Field key for substitution into the template.
    example: "account-number"
    minLength: 1
  value:
    type: string
    description: The field value to substitute into the template key
    example: "1234"
    minLength: 1
