type: object
description: >
  Filter criteria for POST /reports/fees/jobs.
  Both dateFrom and dateTo are required and are treated as inclusive bounds.
additionalProperties: false
required:
  - dateFrom
  - dateTo

properties:

  dateFrom:
    type: string
    format: date
    description: Inclusive start date (YYYY-MM-DD).
    example: "2025-10-01"

  dateTo:
    type: string
    format: date
    description: Inclusive end date (YYYY-MM-DD).
    example: "2025-10-31"

  standardApplicantCode:
    type: string
    description: Standard applicant code (exact match).
    example: "STD-00123"

  applicantSurname:
    type: string
    description: Applicant surname (case-insensitive contains match).
    example: "smith"

  organisationName:
    type: string
    description: Organisation name (case-insensitive contains match).
    example: "acme"

  location:
    $ref: '../common/location.yaml'
