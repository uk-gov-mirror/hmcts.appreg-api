type: object
description: >
  Filter criteria for POST /reports/duration/jobs.
  Both dateFrom and dateTo are required and are treated as inclusive bounds.
  Blank fields will be rejected, nulls should be used instead.
additionalProperties: false
required:
  - dateFrom
  - dateTo

properties:

  dateFrom:
    type: string
    format: date
    description: Inclusive start date (YYYY-MM-DD).
    example: "2025-10-01"
    minLength: 1

  dateTo:
    type: string
    format: date
    description: Inclusive end date (YYYY-MM-DD).
    example: "2025-10-31"
    minLength: 1

  location:
    $ref: '../common/location.yaml'
