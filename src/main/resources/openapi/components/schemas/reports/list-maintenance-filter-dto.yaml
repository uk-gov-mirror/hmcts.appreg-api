type: object
description: >
  Filter criteria for POST /reports/list-maintenance/jobs.
  Both dateFrom and dateTo are required and are treated as inclusive bounds.
  Blank fields will be rejected, nulls should be used instead.
additionalProperties: false
required:
  - dateFrom
  - dateTo

properties:

  dateFrom:
    type: string
    format: date
    description: Inclusive start date (YYYY-MM-DD).
    example: "2025-10-01"

  dateTo:
    type: string
    format: date
    description: Inclusive end date (YYYY-MM-DD).
    example: "2025-10-31"

  listDescription:
    type: string
    description: Case-insensitive contains match on the Application List description.
    example: "morning session"
    maxLength: 200
    minLength: 1

  location:
    $ref: '../common/location.yaml'
