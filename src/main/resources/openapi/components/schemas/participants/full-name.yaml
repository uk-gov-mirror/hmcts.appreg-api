type: object
description: A persons full name. Blank fields will be rejected, nulls should be used instead.
required:
  - surname
  - firstForename

properties:

  title:
    type: string
    description: Prefix before a persons name.
    example: "Mr, Mrs"
    maxLength: 100
    minLength: 1

  surname:
    type: string
    description: The persons family name.
    example: "Smith"
    maxLength: 100
    minLength: 1

  firstForename:
    type: string
    description: The persons first name.
    example: "John"
    maxLength: 100
    minLength: 1

  secondForename:
    type: string
    description: The persons optional second name.
    maxLength: 100
    minLength: 1

  thirdForename:
    type: string
    description: The persons optional third name.
    maxLength: 100
    minLength: 1
