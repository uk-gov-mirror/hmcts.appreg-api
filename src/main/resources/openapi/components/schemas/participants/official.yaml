type: object
description: The Official hearing the application. Blank fields will be rejected, nulls should be used instead.
properties:

  title:
    type: string
    description: Prefix before a persons name.
    example: "Mr, Mrs"
    maxLength: 100
    minLength: 1

  surname:
    type: string
    description: The persons family name.
    example: "Smith"
    maxLength: 100
    minLength: 1

  forename:
    type: string
    description: The persons first name.
    example: "John"
    maxLength: 100
    minLength: 1

  type:
    $ref: './official-type.yaml'
