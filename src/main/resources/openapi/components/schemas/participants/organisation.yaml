type: object
description: The organisation making, or responding to, the application. Blank fields will be rejected, nulls should be used instead.
required:
  - name
  - contactDetails

properties:

  name:
    type: string
    description: The name of the organisation.
    # disallows control characters, allows most other characters.
    pattern: |-
      ^[^\u0000-\u001F\u007F-\u009F]*$
    example: "ACME Industries LTD"
    maxLength: 100
    minLength: 1

  contactDetails:
    $ref: './contact-details.yaml'
