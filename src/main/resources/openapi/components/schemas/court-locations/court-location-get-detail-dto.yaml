type: object
description: Immutable DTO representing a detailed Court Location.
required:
  - name
  - locationCode
  - startDate
  - endDate
properties:
  name:
    type: string
    description: Human-readable court name.
  locationCode:
    type: string
    description: Code that identifies the Court Location.
  startDate:
    type: string
    format: date
    description: Date the Court Location became active.
  endDate:
    type: string
    format: date
    description: Date the Court Location became inactive. `null` indicates that this row is still active.
    nullable: true

additionalProperties: false

