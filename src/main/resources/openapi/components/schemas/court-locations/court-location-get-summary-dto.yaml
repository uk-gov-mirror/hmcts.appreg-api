type: object
description: Lightweight DTO for Court Locations, used in list/search views.
required:
  - name
  - locationCode
properties:
  name:
    type: string
    description: Human-readable court name.
    example: "Cardiff Crown Court Set 1"
  locationCode:
    type: string
    description: Code that identifies the Court Location.
    example: "CCC003"
