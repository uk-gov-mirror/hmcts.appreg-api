type: object
description: Create the same Result for multiple entries (atomic operation).
required:
  - entryIds
  - result

properties:

  entryIds:
    type: array
    description: Array of entry IDs to result. All must belong to the list in the path.
    minItems: 1
    uniqueItems: true
    items:
      type: string
      format: uuid

  result:
    $ref: '../application-list-entry-results/result-create-dto.yaml'
