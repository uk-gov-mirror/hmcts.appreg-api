type: object
description: Lightweight DTO for Application Lists Entries, not retrieved through a parent list. Used in list/search views.
required:
  - id
  - applicantName
  - applicationTitle
  - isFeeRequired
  - isResulted
  - status

properties:

  id:
    type: string
    format: uuid
    description: Unique identifier of the Application List Entry.
    example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"

  applicant:
    description: Name of the person or organisation that made the application.
    example: "John Smith"
    $ref: '../participants/applicant.yaml'

  respondent:
    description: Name of the person or organisation responding to the application.
    example: "Jane Smith"
    $ref: '../participants/applicant.yaml'

  applicationTitle:
    type: string
    description: Descriptive title of the application.
    example: "Application to Crown Court"

  legislation:
    type: string
    description: Legislation under which the application is made.
    example: "Application to Crown Court"

  isFeeRequired:
    type: boolean
    description: True if submitting the application incurs a charge.

  isResulted:
    type: boolean
    description: True if this application list entry has been resulted.

  listId:
    type: string
    format: uuid
    description: Unique Identifier of the Application List to which this entry belongs.
    example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"

  date:
    type: string
    format: date
    description: Single date of the Application List.
    example: "2025-10-07"

  sequenceNumber:
    type: integer
    description: The sequence number of the application in the list.
    example: 1

  resulted:
    $ref: "../result-codes/result-code-get-summary-dto.yaml"

  status:
    $ref: '../application-lists/application-list-status.yaml'
