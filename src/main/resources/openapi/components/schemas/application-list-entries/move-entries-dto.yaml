type: object
description: Parameters to move entries from one Application List to another.
required:
  - targetListId
  - entryIds

properties:

  targetListId:
    type: string
    format: uuid
    description: ID of the **destination** Application List (must differ from the source `listId` in the path).
    example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
  entryIds:
    type: array
    description: Array of entry IDs to move. All must currently belong to the source list.
    minItems: 1
    uniqueItems: true
    items:
      type: string
      format: uuid
    example:   "[\"3fa85f64-5717-4562-b3fc-2c963f66afa6\", \"3fa85f64-5717-4562-b3fc-2c963f66afa7\"]"
