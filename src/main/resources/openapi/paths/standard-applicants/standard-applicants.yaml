get:
  operationId: getStandardApplicants
  tags: [ standard-applicants ]
  summary: Get Standard Applicants (paginated, filterable)
  description: |
    Returns a paginated list of Standard Applicants.
    - Filters:
      - `code` – case-insensitive partial match
      - `name` – case-insensitive partial match
  parameters:
    - in: query
      name: code
      description: Filter by code (contains, case-insensitive).
      schema:
        type: string
        maxLength: 10
      example: "SA"
    - in: query
      name: name
      description: Filter by name (contains, case-insensitive).
      schema:
        type: string
        maxLength: 100
        example: "Innovative Solutions Inc"
    - in: query
      name: addressLine1
      description: Filter by address line 1 (contains, case-insensitive).
      schema:
        type: string
        maxLength: 255
      example: "1 High Street"
    - in: query
      name: from
      description: Filter by from date.
      schema:
        type: string
        format: date
      example: "2026-04-01"
    - in: query
      name: to
      description: Filter by to date.
      schema:
        type: string
        format: date
      example: "2026-12-31"
    - in: query
      name: pageNumber
      schema: { type: integer, format: int32, minimum: 0, default: 0 }
      description: Zero-based page index.
    - in: query
      name: pageSize
      schema: { type: integer, format: int32, minimum: 1, default: 10, maximum: 100 }
      description: Page size.
    - in: query
      name: sort
      description: >
        Sort parameter. Format: `property,(asc|desc)`.
        Example: `?sort=name,asc`.

        Supported properties:
          - `code`
          - `name`
          - `addressLine1`
          - `from`
          - `to`
      style: form
      explode: true
      schema:
        type: array
        items: { type: string }
        example: [ "name,asc", "code,desc" ]
  responses:
    "200":
      description: Page of Standard Applicants.
      headers:
        Vary:
          description: Response varies by Accept for media-type versioning.
          schema: { type: string, example: Accept }
      content:
        application/vnd.hmcts.appreg.v1+json:
          schema: { $ref: "../../components/schemas/standard-applicants/standard-applicant-page.yaml" }
    "400": { $ref: "../../components/responses/bad-request-error.yaml" }
    "401": { $ref: "../../components/responses/unauthorized-error.yaml" }
    "403": { $ref: "../../components/responses/forbidden-error.yaml" }
    "406": { $ref: "../../components/responses/not-acceptable-error.yaml" }
    "500": { $ref: "../../components/responses/internal-server-error.yaml" }
