parameters:
  - in: path
    name: code
    required: true
    description: Code used to identify the Court Location (case-insensitive).
    schema:
      type: string
      maxLength: 10
  - in: query
    name: date
    required: true
    schema: { type: string, format: date }
    description: |
      ISO date (yyyy-MM-dd) on which the Court Location must be valid.
get:
  operationId: getCourtLocationByCodeAndDate
  tags: [court-locations]
  summary: Get a specific Court Location by code and date.
  responses:
    "200":
      description: Court Location found
      headers:
        Vary:
          description: Response varies by Accept for media-type versioning.
          schema: { type: string, example: Accept }
      content:
        application/vnd.hmcts.appreg.v1+json:
          schema:
            $ref: "../../components/schemas/court-locations/court-location-get-detail-dto.yaml"
    "400": { $ref: "../../components/responses/bad-request-error.yaml" }
    "401": { $ref: "../../components/responses/unauthorized-error.yaml" }
    "403": { $ref: "../../components/responses/forbidden-error.yaml" }
    "404": { $ref: "../../components/responses/not-found-error.yaml" }
    "406": { $ref: "../../components/responses/not-acceptable-error.yaml" }
    "500": { $ref: "../../components/responses/internal-server-error.yaml" }
