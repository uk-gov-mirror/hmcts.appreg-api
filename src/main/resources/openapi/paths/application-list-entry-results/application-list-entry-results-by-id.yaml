parameters:
  - in: path
    name: listId
    required: true
    schema: { type: string, format: uuid }
    description: Public identifier of the Application List.
    example: "123e4567-e89b-12d3-a456-426655440000"
  - in: path
    name: entryId
    required: true
    schema: { type: string, format: uuid }
    description: Public identifier of the Application List Entry.
    example: "123e4567-e89b-12d3-a456-426655440000"
  - in: path
    name: resultId
    required: true
    schema: { type: string, format: uuid }
    description: Public identifier of the Application List Entry Result.
    example: "123e4567-e89b-12d3-a456-426655440000"

put:
  operationId: updateApplicationListEntryResult
  tags: [ application-list-entry-results ]
  summary: Update an Application List Entry Result
  description: >
    Full replacement (PUT) of an existing Application List Entry Result.
  requestBody:
    required: true
    content:
      application/vnd.hmcts.appreg.v1+json:
        schema: { $ref: "../../components/schemas/application-list-entry-results/result-update-dto.yaml" }
  responses:
    "200":
      description: Returns the updated Application List Entry Result
      headers:
        Vary:
          description: Response varies by Accept for media-type versioning.
          schema:
            type: string
            example: Accept
      content:
        application/vnd.hmcts.appreg.v1+json:
          schema: { $ref: "../../components/schemas/application-list-entry-results/result-get-dto.yaml" }
    "400": { $ref: "../../components/responses/bad-request-error.yaml" }
    "401": { $ref: "../../components/responses/unauthorized-error.yaml" }
    "403": { $ref: "../../components/responses/forbidden-error.yaml" }
    "404": { $ref: "../../components/responses/not-found-error.yaml" }
    "409": { $ref: "../../components/responses/conflict-error.yaml" }
    "500": { $ref: "../../components/responses/internal-server-error.yaml" }

delete:
  operationId: deleteApplicationListEntryResult
  tags: [ application-list-entry-results ]
  summary: Delete an Application List Entry Result
  description: Permanently deletes the Application List Entry Result identified by `resultId`.
  responses:
    "204":
      description: Application List Entry Result deleted (no content returned)
      headers:
        Vary:
          description: Response varies by Accept for media-type versioning.
          schema:
            type: string
            example: Accept
    "400": { $ref: "../../components/responses/bad-request-error.yaml" }
    "401": { $ref: "../../components/responses/unauthorized-error.yaml" }
    "403": { $ref: "../../components/responses/forbidden-error.yaml" }
    "404": { $ref: "../../components/responses/not-found-error.yaml" }
    "409": { $ref: "../../components/responses/conflict-error.yaml" }
    "500": { $ref: "../../components/responses/internal-server-error.yaml" }
