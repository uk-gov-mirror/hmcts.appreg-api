post:
  operationId: createPrivateProsecutorsIndexReport
  tags: [reports]
  summary: Generate a Private Prosecutors Index report.
  description: >
    Creates an asynchronous job to produce a CSV report listing all applications
    to commence a private prosecution recorded under code MX99010,
    filtered by date range and court location.
    Returns an acknowledgement containing the job ID that can be used to track progress
    and download the report once complete.
  requestBody:
    required: true
    content:
      application/vnd.hmcts.appreg.v1+json:
        schema:
          $ref: "../../components/schemas/reports/private-prosecutors-index-filter-dto.yaml"
  responses:
    "202":
      description: Report job accepted for asynchronous processing.
      headers:
        Location:
          description: URL to poll the report job status.
          schema:
            type: string
            example: "/jobs/job_12345"
        Vary:
          description: Response varies by Accept for media-type versioning.
          schema:
            type: string
            example: Accept
      content:
        application/vnd.hmcts.appreg.v1+json:
          schema:
            $ref: "../../components/schemas/common/job-acknowledgement.yaml"
    "400": { $ref: "../../components/responses/bad-request-error.yaml" }
    "401": { $ref: "../../components/responses/unauthorized-error.yaml" }
    "403": { $ref: "../../components/responses/forbidden-error.yaml" }
    "500": { $ref: "../../components/responses/internal-server-error.yaml" }
