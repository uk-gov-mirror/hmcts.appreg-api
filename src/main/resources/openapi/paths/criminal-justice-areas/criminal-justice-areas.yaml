get:
  operationId: getCriminalJusticeAreas
  tags: [ criminal-justice-areas ]
  summary: Get Criminal Justice Areas (paginated, filterable)
  description: |
    Returns a paginated list of Criminal Justice Areas.
    - Filters:
      - `code` – case-insensitive partial match.
      - `description` – case-insensitive partial match.
  parameters:
    - in: query
      name: code
      schema: { type: string }
      description: Filter by code (contains, case-insensitive).
    - in: query
      name: description
      schema: { type: string }
      description: Filter by description (contains, case-insensitive).
    - in: query
      name: page
      schema: { type: integer, format: int32, minimum: 0, default: 0 }
      description: Zero-based page index.
    - in: query
      name: size
      schema: { type: integer, format: int32, minimum: 1, default: 10, maximum: 100}
      description: Page size.
    - in: query
      name: sort
      description: >
        Repeatable sort parameter. Format per item: `property,(asc|desc)`.
        Example: `?sort=description,asc&sort=code,desc`.
      style: form
      explode: true
      schema:
        type: array
        items: { type: string }
        example: [ "description,asc", "code,desc" ]
  responses:
    "200":
      description: Page of Criminal Justice Areas
      headers:
        Vary:
          description: Response varies by Accept for media-type versioning.
          schema: { type: string, example: Accept }
      content:
        application/vnd.hmcts.appreg.v1+json:
          schema: { $ref: "../../components/schemas/criminal-justice-areas/criminal-justice-area-page.yaml" }
    "400": { $ref: "../../components/responses/bad-request-error.yaml" }
    "401": { $ref: "../../components/responses/unauthorized-error.yaml" }
    "403": { $ref: "../../components/responses/forbidden-error.yaml" }
    "406": { $ref: "../../components/responses/not-acceptable-error.yaml" }
    "500": { $ref: "../../components/responses/internal-server-error.yaml" }
