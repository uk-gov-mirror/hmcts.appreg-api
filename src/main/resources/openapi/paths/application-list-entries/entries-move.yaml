parameters:
  - in: path
    name: listId
    required: true
    schema: { type: string, format: uuid }
    description: ID of the source Application List that currently owns the entries.
    example: "9f7b2a35-57ac-4a1c-9c41-83b6c8157af4"
post:
  operationId: moveApplicationListEntries
  tags: [ application-list-entries ]
  summary: Move entries from one Application List to another.
  description: Moves the specified entries from the **source** list (path `listId`) to a single **destination** list.
  requestBody:
    required: true
    content:
      application/vnd.hmcts.appreg.v1+json:
        schema:
          $ref: "../../components/schemas/application-list-entries/move-entries-dto.yaml"
  responses:
    "200":
      description: All entries successfully moved. No response body.
      headers:
        Vary:
          description: Response varies by Accept for media-type versioning.
          schema:
            type: string
            example: Accept
    "400": { $ref: "../../components/responses/bad-request-error.yaml" }
    "401": { $ref: "../../components/responses/unauthorized-error.yaml" }
    "403": { $ref: "../../components/responses/forbidden-error.yaml" }
    "404": { $ref: "../../components/responses/not-found-error.yaml"}
    "409": { $ref: "../../components/responses/conflict-error.yaml"}
    "500": { $ref: "../../components/responses/internal-server-error.yaml" }
