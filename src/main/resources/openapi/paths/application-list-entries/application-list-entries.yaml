parameters:
  - in: path
    name: listId
    required: true
    schema: { type: string, format: uuid }
    description: Public identifier of the Application List.
    example: "123e4567-e89b-12d3-a456-426655440000"
get:
  operationId: getApplicationListEntries
  tags: [ application-list-entries ]
  summary: Get Application List Entries (paginated, filterable)
  description: Returns a paginated list of Application List Entries linked to a specific Application List.
  parameters:
    - in: query
      name: filter
      description: Filter criteria for Application List Entries.
      required: false
      style: form
      explode: true
      schema:
        $ref: "../../components/schemas/application-list-entries/entry-get-filter-dto.yaml"
    - in: query
      name: pageNumber
      schema: { type: integer, minimum: 0, default: 0 }
    - in: query
      name: pageSize
      schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
    - in: query
      name: sort
      style: form
      explode: true
      schema:
        type: array
        items: { type: string }
        example: [ "date,desc", "status,asc" ]
  responses:
    "200":
      description: Page of Application List Entries
      headers:
        Vary:
          description: Response varies by Accept for media-type versioning.
          schema:
            type: string
            example: Accept
      content:
        application/vnd.hmcts.appreg.v1+json:
          schema: { $ref: "../../components/schemas/application-list-entries/entry-page.yaml" }
    "400": { $ref: "../../components/responses/bad-request-error.yaml" }
    "401": { $ref: "../../components/responses/unauthorized-error.yaml" }
    "403": { $ref: "../../components/responses/forbidden-error.yaml" }
    "406": { $ref: "../../components/responses/not-acceptable-error.yaml" }
    "500": { $ref: "../../components/responses/internal-server-error.yaml" }

post:
  operationId: createApplicationListEntry
  tags: [ application-list-entries ]
  summary: Create an Application List Entry
  requestBody:
    required: true
    content:
      application/vnd.hmcts.appreg.v1+json:
        schema:
          $ref: "../../components/schemas/application-list-entries/entry-create-dto.yaml"
  responses:
    "201":
      description: Returns the created Application List Entry
      headers:
        Location:
          description: URL of the created Application List Entry
          schema: { type: string }
        Vary:
          description: Response varies by Accept for media-type versioning.
          schema:
            type: string
            example: Accept
      content:
        application/vnd.hmcts.appreg.v1+json:
          schema:
            $ref: "../../components/schemas/application-list-entries/entry-get-detail-dto.yaml"
    "400": { $ref: "../../components/responses/bad-request-error.yaml" }
    "401": { $ref: "../../components/responses/unauthorized-error.yaml" }
    "403": { $ref: "../../components/responses/forbidden-error.yaml" }
    "500": { $ref: "../../components/responses/internal-server-error.yaml" }
