post:
  operationId: Runs the background jobs
  tags: [ admin ]
  summary: Executes the job type in the background
  description: Returns the current status and details of an administrative background job.
  parameters:
    - name: jobTypeId
      in: path
      required: true
      schema: {
        $ref: "../../../components/schemas/admin/job-type.yaml"
      }
      description: The unique identifier of the job.
  responses:
    "200":
      description: Job status retrieved successfully.
      headers:
        Vary:
          description: Response varies by Accept for media-type versioning.
          schema: { type: string }
          example: Accept
      content:
        application/vnd.hmcts.appreg.v1+json:
          schema:
            $ref: "../../../components/schemas/admin/job-acknowledgement.yaml"
    "401": { $ref: "../../../components/responses/unauthorized-error.yaml" }
    "403": { $ref: "../../../components/responses/forbidden-error.yaml" }
    "404": { $ref: "../../../components/responses/not-found-error.yaml" }
    "500": { $ref: "../../../components/responses/internal-server-error.yaml" }
