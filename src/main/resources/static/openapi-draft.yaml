info:
  description: RESTful API for managing the Applications Register business processes.
  title: Applications Register API
  version: 1.0.0
openapi: 3.0.3
paths:
  /application-codes:
    get:
      responses:
        '200':
          description: List of application codes
      summary: Get all application codes
    post:
      responses:
        '201':
          description: Application code created
      summary: Create a new application code
  /application-codes/{code-id}:
    parameters:
      - name: code-id
        in: path
        required: true
        schema:
          type: string
    delete:
      responses:
        '204':
          description: Application code deleted
      summary: Delete application code
    get:
      parameters:
        - in: path
          name: code-id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Application code detail
      summary: Get application code by ID
    put:
      responses:
        '200':
          description: Application code updated
      summary: Update application code
  /application-entries/move:
    post:
      responses:
        '200':
          description: Entries moved
      summary: Move one or more entries to another list
  /application-fees:
    get:
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ApplicationFeeGetDto'
                type: array
          description: List of application fees
      summary: Get all application fees
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationFeeCreateDto'
        required: true
      responses:
        '201':
          description: Application fee created
      summary: Create a new application fee
  /application-fees/{id}:
    delete:
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Application fee deleted
      summary: Delete an application fee by ID
    get:
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationFeeGetDto'
          description: Application fee details
      summary: Get an application fee by ID
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    put:
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationFeeUpdateDto'
        required: true
      responses:
        '200':
          description: Application fee updated
      summary: Update an application fee by ID
  /application-lists:
    get:
      responses:
        '200':
          description: List of application lists
      summary: List application lists
    post:
      responses:
        '201':
          description: Application list created
      summary: Create a new application list
  /application-lists/{list-id}:
    parameters:
      - name: list-id
        in: path
        required: true
        schema:
          type: string
    delete:
      responses:
        '204':
          description: Application list deleted
      summary: Delete application list
    get:
      responses:
        '200':
          description: Application list detail
      summary: Get application list by ID
    put:
      responses:
        '200':
          description: Application list updated
      summary: Update application list
  /application-lists/{list-id}/entries:
    parameters:
      - name: list-id
        in: path
        required: true
        schema:
          type: string
    get:
      responses:
        '200':
          description: List of application list entries
      summary: Get all entries in a list
    post:
      responses:
        '201':
          description: Application list entry added
      summary: Add entry to list
  /application-lists/{list-id}/entries/bulk-upload:
    parameters:
      - name: list-id
        in: path
        required: true
        schema:
          type: string
    post:
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                file:
                  format: binary
                  type: string
              type: object
      responses:
        '200':
          description: Upload processed successfully
      summary: Bulk upload applications via CSV
  /application-lists/{list-id}/entries/results:
    parameters:
      - name: list-id
        in: path
        required: true
        schema:
          type: string
    post:
      responses:
        '200':
          description: Results added successfully
      summary: Bulk add results to entries
