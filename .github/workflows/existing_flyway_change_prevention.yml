name: Block merge if restricted directory changes

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-directory-change:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Check for changes under restricted directory
        id: check_changes
        run: |
          # Get a list of changed files compared to base
          git fetch origin ${{ github.event.pull_request.base.ref }}
          CHANGED_FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }} HEAD)

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Check if any changed files are under config/
          if echo "$CHANGED_FILES" | grep -q "^flyway/"; then
            echo "🚫 Changes detected in restricted directory: flyway/"
            exit 1
          else
            echo "✅ No restricted files changed."
          fi
